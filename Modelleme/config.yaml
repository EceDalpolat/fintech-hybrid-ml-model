
data:
  ind_path: "data/raw/dcpc_2024_indlevel_public.csv"
  tran_path: "data/raw/dcpc_2024_tranlevel_public.csv"
  processed_path: "data/processed/merged_dataset.csv"
  target: "pi"
  test_size: 0.2
  random_state: 42

model:
  type: "random_forest"
  params:
    n_estimators: 100
    max_depth: 20
    min_samples_split: 5
    random_state: 42
    #class_weight: "balanced"

optimization:
  enabled: true
  method: "abc-pso"  # Options: grid, abc, pso, abc-pso
  scoring: "accuracy"
  cv: 3
  n_jobs: 8
  verbose: 2

  # NiaPy meta-heuristic parameters
  # Khuat & Le (2018): NE=50, MCN=1000
  niapy_params:
    population_size: 20
    max_iters: 50
    # Chen (2020) Hybrid ABC-PSO parameters
    w: 0.9
    bounds:
      n_estimators: [100, 1500]
      max_depth: [5, 100]
      min_samples_split: [2, 20]
      min_samples_leaf: [1, 10]
      max_features: [0.05, 1.0]

  # Classic Grid Search (backup)
  param_grid:
    classifier__n_estimators: [50, 100, 200]
    classifier__max_depth: [10, 20, null]

training:
  epochs: 50

feature_engineering:
  drop_cols: ['id', 'time', 'tran', 'tran_report', 'paylocaltime', 'cashdeptime', 'cashgettime', 'cashgetsource', 'cashgetlocation']
  missing_threshold: 0.80
  
logging:
  config_path: "logging.yaml"
